<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Travel Form — Share Tech Font</title>

<!-- Google Fonts: Share Tech -->
<link href="https://fonts.googleapis.com/css2?family=Share+Tech&display=swap" rel="stylesheet">

<style>
*{
  box-sizing: border-box;
}

body{
  margin:0;
  font-family: 'Share Tech', 'Arial', sans-serif;
  background: transparent;
}

/* Container — giảm bottom margin và padding dưới */
.container{
  width:100%;
  max-width:280px;
  margin:18px auto 8px auto;  /* giảm bottom margin từ 18px xuống 8px */
  padding:12px 12px 8px 12px; /* giảm padding bottom từ 12px xuống 8px */
  border-radius:16px;
  background: transparent;
  backdrop-filter: blur(10px);
}

/* Title */
h2{
  margin-top:-30px;
  text-align:center;
  margin-bottom:-9px;
  color:#222;
  font-family: 'Share Tech', monospace;
  letter-spacing: 0.5px;
  font-size: 1.3rem;
}

/* Input group */
.input-group{
  display:flex;
  align-items:center;
  gap:8px;
  margin:8px 0;      /* giữ nguyên */
  padding:8px 10px;
  border-radius:12px;
  background: #ffffff;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  transition:0.2s;
}

.input-group:hover{
  transform: translateY(-1px);
}

.input-group:focus-within{
  box-shadow: 0 0 0 2px #8B0000;
}

.input-group span{
  font-size:14px;
  font-family: 'Share Tech', sans-serif;
}

.input-group input,
.input-group select{
  flex:1;
  border:none;
  outline:none;
  background:transparent;
  font-size:13px;
  font-family: 'Share Tech', sans-serif;
  font-weight: normal;
}

/* Button — giảm margin bottom và padding */
button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:12px;
  background:#8B0000;
  color:white;
  font-weight:bold;
  cursor:pointer;
  margin-top:4px;      /* giảm từ 0 xuống 4px để hơi cách nhẹ */
  margin-bottom:0;     /* không có margin bottom */
  transition:0.2s;
  font-family: 'Share Tech', sans-serif;
  font-size: 14px;
  letter-spacing: 0.3px;
}

button:hover{
  background:#a30000;
}

/* Message — giảm margin top và bottom */
#msg{
  text-align:center;
  margin-top:6px;      /* giảm từ 8px xuống 6px */
  margin-bottom:0;     /* không có margin bottom */
  color:#333;
  font-size:12px;
  font-family: 'Share Tech', sans-serif;
}

/* Placeholder */
.input-group input::placeholder,
.input-group select:invalid {
  font-family: 'Share Tech', sans-serif;
  font-size:12px;
}

/* Loại bỏ khoảng trống thừa cuối cùng */
.container:after {
  content: "";
  display: block;
  height: 0;
  clear: both;
}
</style>
</head>

<body>

<div class="container">
  <h2>Plan Your Trip</h2>

  <div class="input-group">
    <span>👤</span>
    <input type="text" id="name" placeholder="Your Name">
  </div>

  <div class="input-group">
    <span>📧</span>
    <input type="email" id="email" placeholder="Email">
  </div>

  <div class="input-group">
    <span>📍</span>
    <select id="destination">
      <option value="">Choose destination</option>
      <option>Moscow</option>
      <option>Saint Petersburg</option>
      <option>Lake Baikal</option>
    </select>
  </div>

  <button onclick="submitForm()">Explore Now ✈️</button>

  <p id="msg"></p>
</div>

<script>
const API = "https://sheetdb.io/api/v1/fblijfisxjyc0";

function submitForm(){
  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;
  let destination = document.getElementById("destination").value;

  if(!name || !email){
    return show("Please fill required fields");
  }

  fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      data:[{name,email,destination}]
    })
  }).then(()=>{
    show("Request sent ✈️");
  }).catch(()=>{
    show("Network error, try again");
  });
}

function show(text){
  document.getElementById("msg").innerText = text;
}
</script>

</body>
</html>
