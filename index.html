<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Travel Form</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: transparent;
}

/* Container gọn như widget */
.container{
  max-width:320px;
  margin:20px auto;
  padding:15px;
  border-radius:16px;
  background:  transparent;
  backdrop-filter: blur(10px);
}

/* Title */
h2{
  text-align:center;
  margin-bottom:10px;
  color:#222;
}

/* Input group có icon */
.input-group{
  position:relative;
  margin:10px 0;
}

.input-group span{
  position:absolute;
  left:10px;
  top:50%;
  transform:translateY(-50%);
  font-size:14px;
}

/* Input + select */
input, select{
  width:85%;
  margin:0 auto;
  display:block;
  padding:10px 10px 10px 35px;
  border-radius:10px;
  border:1px solid rgba(0,0,0,0.1);
  background: rgba(255,255,255,0.6);
}

/* Button */
button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#8B0000;
  color:white;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

/* Message */
#msg{
  text-align:center;
  margin-top:8px;
  color:#333;
}
</style>
</head>

<body>

<div class="container">
  <h2>Plan Your Trip</h2>

  <div class="input-group">
    <span>👤</span>
    <input type="text" id="name" placeholder="Your Name">
  </div>

  <div class="input-group">
    <span>📧</span>
    <input type="email" id="email" placeholder="Email">
  </div>

  <div class="input-group">
    <span>📍</span>
    <select id="destination">
      <option value="">Choose destination</option>
      <option>Moscow</option>
      <option>Saint Petersburg</option>
      <option>Lake Baikal</option>
    </select>
  </div>

  <button onclick="submitForm()">Explore Now ✈️</button>

  <p id="msg"></p>
</div>

<script>
const API = "https://sheetdb.io/api/v1/fblijfisxjyc0";

function submitForm(){
  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;
  let destination = document.getElementById("destination").value;

  if(!name || !email){
    return show("Please fill required fields");
  }

  fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      data:[{name,email,destination}]
    })
  }).then(()=>{
    show("Request sent ✈️");
  });
}

function show(text){
  document.getElementById("msg").innerText = text;
}
</script>

</body>
</html>
