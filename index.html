<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Travel Form</title>

<style>
*{
  box-sizing: border-box;
}

body{
  margin:0;
  font-family: Arial, sans-serif;
  background: transparent;
}

/* Container */
.container{
  width:100%;
  max-width:300px;
  margin:20px auto;
  padding:15px;
  border-radius:16px;
  background: transparent;
  backdrop-filter: blur(10px);
}

/* Title */
h2{
  text-align:center;
  margin-bottom:12px;
  color:#222;
}

/* Input group */
.input-group{
  display:flex;
  align-items:center;
  gap:10px;
  margin:12px 0;
  padding:12px;
  border-radius:12px;
  background: #ffffff; /* 👈 box có màu */
  box-shadow: 0 3px 10px rgba(0,0,0,0.08);
  transition:0.2s;
}

/* Hover + focus */
.input-group:hover{
  transform: translateY(-1px);
}

.input-group:focus-within{
  box-shadow: 0 0 0 2px #8B0000;
}

/* Icon */
.input-group span{
  font-size:15px;
}

/* Input + Select */
.input-group input,
.input-group select{
  flex:1;
  border:none;
  outline:none;
  background:transparent;
  font-size:14px;
}

/* Button */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#8B0000;
  color:white;
  font-weight:bold;
  cursor:pointer;
  margin-top:12px;
  transition:0.2s;
}

button:hover{
  background:#a30000;
}

/* Message */
#msg{
  text-align:center;
  margin-top:10px;
  color:#333;
  font-size:14px;
}
</style>
</head>

<body>

<div class="container">
  <h2>Plan Your Trip</h2>

  <div class="input-group">
    <span>👤</span>
    <input type="text" id="name" placeholder="Your Name">
  </div>

  <div class="input-group">
    <span>📧</span>
    <input type="email" id="email" placeholder="Email">
  </div>

  <div class="input-group">
    <span>📍</span>
    <select id="destination">
      <option value="">Choose destination</option>
      <option>Moscow</option>
      <option>Saint Petersburg</option>
      <option>Lake Baikal</option>
    </select>
  </div>

  <button onclick="submitForm()">Explore Now ✈️</button>

  <p id="msg"></p>
</div>

<script>
const API = "https://sheetdb.io/api/v1/fblijfisxjyc0";

function submitForm(){
  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;
  let destination = document.getElementById("destination").value;

  if(!name || !email){
    return show("Please fill required fields");
  }

  fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      data:[{name,email,destination}]
    })
  }).then(()=>{
    show("Request sent ✈️");
  });
}

function show(text){
  document.getElementById("msg").innerText = text;
}
</script>

</body>
</html>
